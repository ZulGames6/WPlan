server:
  port: 8080
  servlet:
    session:
      cookie:
        name: POLOPLAN_SESSION
        http-only: true
        same-site: lax

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/poloplan?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:poloplan}
    password: ${SPRING_DATASOURCE_PASSWORD:poloplan}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  main:
    banner-mode: console

logging:
  level:
    org.springframework.security: INFO
